<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceleracion</title>
</head>
<body>
    <h1>Aceleración</h1>
    <p><strong>Fórmula:</strong> a = (vf - vi) / t</p>

    <form method="POST">
        {% csrf_token %}

        <label>¿Qué deseas calcular?</label><br>
        <select name="buscar">
            <option value="a">Aceleración (a)</option>
            <option value="vf">Velocidad final (vf)</option>
            <option value="vi">Velocidad inicial (vi)</option>
            <option value="t">Tiempo (t)</option>
        </select><br><br>

        <label>Velocidad inicial (vi) m/s:</label>
        <input type="number" name="vi" step="any"><br><br>

        <label>Velocidad final (vf) m/s:</label>
        <input type="number" name="vf" step="any"><br><br>

        <label>Aceleración (a) m/s²:</label>
        <input type="number" name="a" step="any"><br><br>

        <label>Tiempo (t) s:</label>
        <input type="number" name="t" step="any"><br><br>

        <button type="submit">Calcular</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    {% if resultado is not None %}
        <h2>{{ variable_resuelta }}: {{ resultado }}</h2>
    {% endif %}

    <br><a href="/">← Volver</a>
</body>
</html>
