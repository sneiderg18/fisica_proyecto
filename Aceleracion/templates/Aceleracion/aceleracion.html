<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceleracion</title>
</head>
<body>
    <h1>Aceleración</h1>
    <p><strong>Fórmula:</strong> a = (vf - vi) / t</p>

    <form method="POST">
        {% csrf_token %}

        <label>¿Qué deseas calcular?</label><br>
        <select name="buscar" id="buscar" onchange="actualizarCampos()">
            <option value="a"  {% if post.buscar == 'a'  %}selected{% endif %}>Aceleración (a)</option>
            <option value="vf" {% if post.buscar == 'vf' %}selected{% endif %}>Velocidad final (vf)</option>
            <option value="vi" {% if post.buscar == 'vi' %}selected{% endif %}>Velocidad inicial (vi)</option>
            <option value="t"  {% if post.buscar == 't'  %}selected{% endif %}>Tiempo (t)</option>
        </select><br><br>

        <label>Velocidad inicial (vi) m/s:</label>
        <input type="number" name="vi" id="vi" step="any" value="{{ post.vi }}"><br><br>

        <label>Velocidad final (vf) m/s:</label>
        <input type="number" name="vf" id="vf" step="any" value="{{ post.vf }}"><br><br>

        <label>Aceleración (a) m/s²:</label>
        <input type="number" name="a" id="a" step="any" value="{{ post.a }}"><br><br>

        <label>Tiempo (t) s:</label>
        <input type="number" name="t" id="t" step="any" value="{{ post.t }}"><br><br>

        <button type="submit">Calcular</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    {% if resultado is not None %}
        <h2>{{ variable_resuelta }}: {{ resultado }}</h2>
    {% endif %}

    <br><a href="/">← Volver</a>

    <script>
    const camposBloqueados = {
        'a':  ['a'],
        'vf': ['vf'],
        'vi': ['vi'],
        't':  ['t'],
    };

    function actualizarCampos(limpiar = true) {
        const buscar = document.getElementById('buscar').value;
        const todosLosCampos = ['vi', 'vf', 'a', 't'];

        todosLosCampos.forEach(campo => {
            const input = document.getElementById(campo);
            input.disabled = false;
            if (limpiar) input.value = '';  
            input.style.backgroundColor = '';
        });

        camposBloqueados[buscar].forEach(campo => {
            const input = document.getElementById(campo);
            input.disabled = true;
            input.value = '';
            input.style.backgroundColor = '#e0e0e0';
        });
    }
    actualizarCampos(false);
</script>
</body>
</html>
