<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicion</title>
</head>
<body>
    <h1>Posición con velocidad constante</h1>
    <p><strong>Fórmula:</strong> x = x₀ + v·t</p>

    <form method="POST">
        {% csrf_token %}

        <label>¿Qué deseas calcular?</label><br>
        <select name="buscar" id="buscar" onchange="actualizarCampos()">
            <option value="x"  {% if post.buscar == 'x'  %}selected{% endif %}>Posición final (x)</option>
            <option value="x0" {% if post.buscar == 'x0' %}selected{% endif %}>Posición inicial (x0)</option>
            <option value="v"  {% if post.buscar == 'v'  %}selected{% endif %}>Velocidad (v)</option>
            <option value="t"  {% if post.buscar == 't'  %}selected{% endif %}>Tiempo (t)</option>
        </select><br><br>

        <label>Posición final (x) m:</label>
        <input type="number" name="x" id="x" step="any" value="{{ post.x }}"><br><br>

        <label>Posición inicial (x₀) m:</label>
        <input type="number" name="x0" id="x0" step="any" value="{{ post.x0 }}"><br><br>

        <label>Velocidad (v) m/s:</label>
        <input type="number" name="v" id="v" step="any" value="{{ post.v }}"><br><br>

        <label>Tiempo (t) s:</label>
        <input type="number" name="t" id="t" step="any" value="{{ post.t }}"><br><br>

        <button type="submit">Calcular</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    {% if resultado is not None %}
        <h2>{{ variable_resuelta }}: {{ resultado }}</h2>
    {% endif %}

    <br><a href="/">← Volver</a>

    <script>
    const camposBloqueados = {
        'x':  ['x'],
        'x0': ['x0'],
        'v':  ['v'],
        't':  ['t'],
    };

    function actualizarCampos(limpiar = true) {
        const buscar = document.getElementById('buscar').value;
        const todosLosCampos = ['x', 'x0', 'v', 't'];

        todosLosCampos.forEach(campo => {
            const input = document.getElementById(campo);
            input.disabled = false;
            if (limpiar) input.value = '';  
            input.style.backgroundColor = '';
        });

        camposBloqueados[buscar].forEach(campo => {
            const input = document.getElementById(campo);
            input.disabled = true;
            input.value = '';
            input.style.backgroundColor = '#e0e0e0';
        });
    }
    actualizarCampos(false);
</script>
</body>
</html>
