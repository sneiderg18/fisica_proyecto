<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicion</title>
</head>
<body>
    <h1>Posición con velocidad constante</h1>
    <p><strong>Fórmula:</strong> x = x₀ + v·t</p>

    <form method="POST">
        {% csrf_token %}

        <label>¿Qué deseas calcular?</label><br>
        <select name="buscar">
            <option value="x">Posición final (x)</option>
            <option value="x0">Posición inicial (x0)</option>
            <option value="v">Velocidad (v)</option>
            <option value="t">Tiempo (t)</option>
        </select><br><br>

        <label>Posición final (x) m:</label>
        <input type="number" name="x" step="any"><br><br>

        <label>Posición inicial (x₀) m:</label>
        <input type="number" name="x0" step="any"><br><br>

        <label>Velocidad (v) m/s:</label>
        <input type="number" name="v" step="any"><br><br>

        <label>Tiempo (t) s:</label>
        <input type="number" name="t" step="any"><br><br>

        <button type="submit">Calcular</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    {% if resultado is not None %}
        <h2>{{ variable_resuelta }}: {{ resultado }}</h2>
    {% endif %}

    <br><a href="/">← Volver</a>
</body>
</html>
